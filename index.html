<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Acessando...</title>
</head>
<body style="background-color: #f0f0f0; text-align: center; font-family: sans-serif; padding-top: 50px;">
    <h2>Redirecionando para o conteúdo...</h2>
    
    <script type="module">
        // Importa os módulos do Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // COLOQUE SUAS CREDENCIAIS AQUI DENTRO (Copie do Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyBA4QZpTDbfMQrIiCBhpswgD7-TTqgONpo",
            authDomain: "instagram-gustavokehl.firebaseapp.com",
            databaseURL: "https://instagram-gustavokehl-default-rtdb.firebaseio.com",
            storageBucket: "instagram-gustavokehl.firebasestorage.app",
            messagingSenderId: "538606143822",
            appId: "1:538606143822:web:d3a7447e3eb04ef9cab61f"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Pega as informações do aparelho
        const aparelhoInfo = navigator.userAgent;
        const horaAtual = new Date().toLocaleTimeString();

        // Envia para o banco de dados e depois redireciona
        push(ref(db, 'capturas'), {
            dispositivo: aparelhoInfo,
            hora: horaAtual
        }).then(() => {
            // Redireciona a pessoa para o site da Unoesc/Instagram
            window.location.href = "https://cbn.globo.com/podcasts/thassius-veloso-dia-a-dia-digital/noticia/2026/04/01/mais-de-60-sites-fingem-ser-da-receita-federal-e-aplicam-golpes-em-quem-tenta-declarar-ir.ghtml";
        }).catch((error) => {
            console.error("Erro:", error);
            window.location.href = "https://cbn.globo.com/podcasts/thassius-veloso-dia-a-dia-digital/noticia/2026/04/01/mais-de-60-sites-fingem-ser-da-receita-federal-e-aplicam-golpes-em-quem-tenta-declarar-ir.ghtml"; // Redireciona mesmo se der erro
        });
    </script>
</body>
</html>
